<!DOCTYPE html>
<html lang="it"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>2FAST4U · Accedi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0518;--bg2:#140A28;--bg3:#1D1140;--line:#2C1E52;--amber:#FFC91E;--cyan:#2BA8E6;--purple:#9B3BE0;--ink:#F4EEFF;--muted:#8E7FB8;--good:#3ddc84;--danger:#ff5b6b;--disp:'Oswald',system-ui,sans-serif;}
*{box-sizing:border-box}
html,body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--disp);font-weight:300}
body{display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(130% 90% at 50% -20%,#241150 0%,#0B0518 55%)}
.box{width:100%;max-width:380px}
.logo{text-align:center;font-weight:700;letter-spacing:3px;font-size:30px;margin-bottom:4px}.logo b{color:var(--amber)}.logo span{color:var(--cyan)}
.back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:12px;color:var(--muted);margin-bottom:14px}.back:hover{color:var(--cyan)}
.tag{text-align:center;color:var(--muted);font-size:13px;letter-spacing:1px;margin-bottom:22px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:22px}
.tabs{display:flex;gap:6px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:18px}
.tabs button{flex:1;font:inherit;font-size:14px;letter-spacing:.5px;border:0;background:transparent;color:var(--muted);padding:9px;border-radius:8px;cursor:pointer}
.tabs button.on{background:var(--bg3);color:var(--ink);font-weight:500}
label{display:block;font-size:12px;letter-spacing:.5px;color:var(--muted);margin:12px 0 5px}
input{width:100%;font:inherit;font-size:15px;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:11px 12px}
input:focus{outline:none;border-color:var(--cyan)}
.go{width:100%;margin-top:18px;font:inherit;font-size:16px;font-weight:600;letter-spacing:.5px;border:0;border-radius:10px;padding:13px;cursor:pointer;color:#180a05;background:linear-gradient(135deg,#FFD86A,var(--amber))}
.go:disabled{opacity:.5;cursor:default}
.msg{margin-top:14px;font-size:13px;line-height:1.5;padding:10px 12px;border-radius:9px;display:none}
.msg.err{display:block;background:#3a0f16;border:1px solid #6b2530;color:#ffb3bd}
.msg.ok{display:block;background:#0f2a1a;border:1px solid #245c3a;color:#9be8b8}
.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:16px;line-height:1.6}
.foot a{color:var(--cyan);text-decoration:none}
.warn{background:#2a1c05;border:1px solid #6b5010;color:#ffe6a3;border-radius:12px;padding:14px 15px;font-size:12.5px;line-height:1.6;margin-bottom:16px}
.warn b{color:var(--amber)}
.warn code{background:#00000040;padding:1px 5px;border-radius:4px;font-family:ui-monospace,monospace;font-size:11.5px}
</style></head>
<body>
<div class="box">
  <a class="back" href="landing.html">← Vetrina</a>
  <div class="logo">2<b>FAST</b>4<span>U</span></div>
  <div class="tag">LA STRADA È TUA</div>

  <div class="warn" id="warn" style="display:none">
    <b>Supabase non ancora configurato.</b><br>
    Apri <code>supabase-config.js</code> e incolla <b>Project URL</b> e <b>anon key</b>
    (Dashboard Supabase → Project Settings → API). Poi ricarica questa pagina.
  </div>

  <div class="card" id="card">
    <div class="tabs">
      <button id="tab-in" class="on" onclick="setMode('in')">Accedi</button>
      <button id="tab-up" onclick="setMode('up')">Registrati</button>
    </div>

    <div id="nick-wrap" style="display:none">
      <label for="nick">Nickname (nome in gioco)</label>
      <input id="nick" type="text" maxlength="12" placeholder="Es. Jacopo" autocomplete="off" spellcheck="false">
    </div>

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="tu@email.it" spellcheck="false">

    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••">

    <button class="go" id="go" onclick="submit()">Entra</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="foot">Corse clandestine · gioco di carte in tempo reale</div>
</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var CFG = window.SB_CONFIG || {};
var mode = 'in';
var sb = null;
var msgEl = document.getElementById('msg');
var goEl  = document.getElementById('go');

function showMsg(text, kind){ msgEl.className = 'msg ' + kind; msgEl.textContent = text; }
function clearMsg(){ msgEl.className = 'msg'; msgEl.textContent = ''; }

function setMode(m){
  mode = m;
  document.getElementById('tab-in').classList.toggle('on', m==='in');
  document.getElementById('tab-up').classList.toggle('on', m==='up');
  document.getElementById('nick-wrap').style.display = (m==='up') ? 'block' : 'none';
  document.getElementById('pw').setAttribute('autocomplete', m==='in' ? 'current-password' : 'new-password');
  goEl.textContent = m==='in' ? 'Entra' : 'Crea account';
  clearMsg();
}

function configured(){ return !!(CFG.url && CFG.anonKey && window.supabase && window.supabase.createClient); }

if(!configured()){
  document.getElementById('warn').style.display = 'block';
  document.getElementById('card').style.opacity = '.55';
  goEl.disabled = true;
  document.getElementById('email').disabled = true;
  document.getElementById('pw').disabled = true;
  document.getElementById('nick').disabled = true;
} else {
  sb = window.supabase.createClient(CFG.url, CFG.anonKey);
  // già loggato? vai direttamente all'area di gioco
  sb.auth.getSession().then(function(res){
    var s = res && res.data ? res.data.session : null;
    if(s) location.replace(CFG.homePage || 'home.html');
  });
  // invio con Enter
  document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
  document.getElementById('email').addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
}

async function submit(){
  if(!sb) return;
  var email = document.getElementById('email').value.trim();
  var pw = document.getElementById('pw').value;
  if(!email || !pw){ showMsg('Inserisci email e password.', 'err'); return; }
  if(mode==='up' && pw.length < 6){ showMsg('La password deve avere almeno 6 caratteri.', 'err'); return; }
  var nick = '';
  if(mode==='up'){
    nick = document.getElementById('nick').value.trim();
    if(!/^[A-Za-z0-9_.\- ]{3,12}$/.test(nick)){ showMsg('Nickname: 3–12 caratteri (lettere, numeri, spazio, _ . -).', 'err'); return; }
  }

  goEl.disabled = true; clearMsg();
  try {
    if(mode==='in'){
      var r1 = await sb.auth.signInWithPassword({ email: email, password: pw });
      if(r1.error) throw r1.error;
      location.replace(CFG.homePage || 'home.html');
      return;
    } else {
      var av = await sb.rpc('nickname_available', { nick: nick });
      if(av.error) throw av.error;
      if(av.data === false){ showMsg('Nickname già in uso: scegline un altro.', 'err'); return; }
      var r2 = await sb.auth.signUp({ email: email, password: pw, options: { data: { nickname: nick } } });
      if(r2.error) throw r2.error;
      if(r2.data && r2.data.session){
        location.replace(CFG.homePage || 'home.html');   // conferma email disattivata: dentro subito
        return;
      }
      showMsg('Account creato. Ti abbiamo inviato una mail: conferma il link, poi torna qui e accedi.', 'ok');
      setMode('in');
    }
  } catch(err){
    var m = (err && err.message) ? err.message : 'Errore, riprova.';
    if(/invalid login credentials/i.test(m)) m = 'Email o password non corretti.';
    else if(/already registered|already exists|user already/i.test(m)) m = 'Questa email è già registrata: usa Accedi.';
    else if(/duplicate key|unique|nickname/i.test(m)) m = 'Nickname già in uso: scegline un altro.';
    else if(/database error/i.test(m)) m = 'Nickname forse già preso: prova con un altro.';
    else if(/email not confirmed/i.test(m)) m = 'Devi confermare la mail prima di accedere (controlla la posta).';
    else if(/rate limit/i.test(m)) m = 'Troppi tentativi: attendi un minuto e riprova.';
    showMsg(m, 'err');
  } finally {
    goEl.disabled = false;
  }
}
</script>
<script>
/* 2FAST4U — musica di sottofondo condivisa tra tutte le pagine.
   Continua da dove era (salva brano + posizione in localStorage), si ferma solo in gara. */
(function(){
  var MUSIC=['/audio/Ita-Intro.mp3','/audio/Eng-Base.mp3','/audio/Ita-Latin.mp3','/audio/Eng-Base5.mp3','/audio/Ita-Bombola_Taranta.mp3'];
  var KEY='2f4u_mus';
  function load(){ try{ return JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ return {}; } }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(st)); }catch(e){} }
  var st=load();
  if(st.i==null) st.i=Math.floor(Math.random()*MUSIC.length);
  if(st.on==null) st.on=true;
  if(st.vol==null) st.vol=0.4;
  if(st.t==null) st.t=0;
  var a=null, saveInt=null, blockedRace=false;

  function persist(){ if(a){ st.t=a.currentTime||0; save(); } }
  function ensure(){
    if(a) return;
    a=new Audio(); a.volume=st.vol; a.preload='auto'; a.src=MUSIC[st.i];
    a.addEventListener('loadedmetadata',function(){ if(st.t>0 && st.t<(a.duration||1e9)){ try{ a.currentTime=st.t; }catch(e){} } });
    a.addEventListener('ended',function(){ var n; do{ n=Math.floor(Math.random()*MUSIC.length); }while(MUSIC.length>1 && n===st.i); st.i=n; st.t=0; save(); a.src=MUSIC[st.i]; if(st.on&&!blockedRace) a.play().catch(function(){}); });
  }
  function start(){ if(blockedRace) return; ensure(); if(!st.on) return; a.play().catch(function(){}); if(!saveInt) saveInt=setInterval(persist,1000); }
  function stop(){ persist(); if(a) a.pause(); }

  function updBtn(){ var b=document.getElementById('mus-toggle'); if(b) b.textContent=st.on?'\u266a':'\uD83D\uDD07'; }
  function ui(){
    if(document.getElementById('mus-ctrl')) return;
    var d=document.createElement('div'); d.id='mus-ctrl';
    d.style.cssText='position:fixed;bottom:8px;left:8px;z-index:99999;display:flex;align-items:center;gap:6px;background:rgba(11,5,24,.72);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:3px 8px;font-family:sans-serif';
    d.innerHTML='<button id="mus-toggle" title="Musica on/off" style="background:none;border:none;color:#F4EEFF;font-size:15px;cursor:pointer;padding:0;line-height:1">'+(st.on?'\u266a':'\uD83D\uDD07')+'</button>'
      +'<input id="mus-vol" type="range" min="0" max="100" value="'+Math.round(st.vol*100)+'" title="Volume" style="width:56px;accent-color:#2BA8E6">';
    document.body.appendChild(d);
    d.querySelector('#mus-toggle').addEventListener('click',function(){ st.on=!st.on; save(); if(st.on) start(); else stop(); updBtn(); });
    d.querySelector('#mus-vol').addEventListener('input',function(){ st.vol=Math.max(0,Math.min(1,this.value/100)); if(a) a.volume=st.vol; save(); });
  }

  // API usata dal gioco per fermare/riprendere in gara
  window.MUS={
    stop:function(){ blockedRace=true; stop(); var c=document.getElementById('mus-ctrl'); if(c) c.style.display='none'; },
    resume:function(){ blockedRace=false; var c=document.getElementById('mus-ctrl'); if(c) c.style.display='flex'; if(st.on) start(); }
  };

  function init(){ ui(); if(st.on) start(); }
  if(document.body) init(); else window.addEventListener('DOMContentLoaded', init);
  // sblocco autoplay al primo tocco/tasto (i browser bloccano l'audio automatico)
  function once(){ if(st.on) start(); window.removeEventListener('pointerdown',once); window.removeEventListener('keydown',once); }
  window.addEventListener('pointerdown',once); window.addEventListener('keydown',once);
  window.addEventListener('pagehide',persist); window.addEventListener('beforeunload',persist);
})();
</script>
</body></html>
